<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffc0cb;
  overflow: hidden;
  text-align: center;
  color: #fff;
}

.section {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* BUTTON */
button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.1);
}

/* BUNNY */
.bunny {
  font-size: 60px;
  animation: float 2s infinite;
}
@keyframes float {
  50% { transform: translateY(-10px); }
}

/* NIGHT SKY */
.night {
  background: linear-gradient(#1a1a2e, #16213e);
}

/* CHAT */
.chat-box {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  max-width: 300px;
}
.msg {
  background: #ffc0cb;
  padding: 8px;
  border-radius: 10px;
  margin: 5px;
}

/* FOTO */
img {
  width: 200px;
  border-radius: 15px;
  margin: 10px;
}

/* HEART FALL */
.heart {
  position: absolute;
  animation: fall 5s linear infinite;
}
@keyframes fall {
  0% { top: -10%; }
  100% { top: 110%; }
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://files.catbox.moe/5q8f4z.mp3" type="audio/mp3">
</audio>

<!-- 1 OPEN -->
<div class="section active" id="open">
  <div class="bunny">🐰</div>
  <h1>Open This 💌</h1>
  <button onclick="next('game')">Open</button>
</div>

<!-- 2 MINI GAME -->
<div class="section" id="game">
  <h2>Aku lucu ga? 😤</h2>
  <button onclick="next('game2')">Lucu banget 💕</button>
  <button onclick="next('game2')">Lucu banget banget 😭</button>
</div>

<div class="section" id="game2">
  <h2>Kamu sayang aku ga? 😳</h2>
  <button onclick="next('night')">Iya 💕</button>
  <button id="noBtn">Engga 😒</button>
</div>

<!-- 3 NIGHT SKY -->
<div class="section night" id="night">
  <h2 id="nightText"></h2>
  <button onclick="next('chat')">Lanjut…</button>
</div>

<!-- 4 CHAT -->
<div class="section" id="chat">
  <div class="chat-box">
    <div class="msg">haiii</div>
    <div class="msg">kamu siapa 😳</div>
    <div class="msg">aku orang yang bakal sayang kamu 😤💗</div>
  </div>
  <button onclick="next('foto')">Next</button>
</div>

<!-- 5 FOTO -->
<div class="section" id="foto">
  <h2>Momen Kita 💗</h2>
  <img src="https://i.imgur.com/8Km9tLL.jpg">
  <img src="https://i.imgur.com/j6qG5xM.jpg">
  <button onclick="next('surprise')">Next</button>
</div>

<!-- 6 SURPRISE -->
<div class="section" id="surprise">
  <h1>💗 SURPRISE 💗</h1>
  <p>aku ada sesuatu buat kamu…</p>
  <button onclick="next('final')">Open</button>
</div>

<!-- 7 FINAL -->
<div class="section" id="final">
  <h1>For You 💗</h1>
  <p id="finalText"></p>
</div>

<script>
function next(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById("music").play();
}

/* NO BUTTON KABUR */
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random()*80 + "%";
  noBtn.style.top = Math.random()*80 + "%";
});

/* NIGHT TEXT */
let text = "di antara semua bintang... aku tetap milih kamu 💗";
let i=0;
function typing(){
  if(i < text.length){
    document.getElementById("nightText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,50);
  }
}
setTimeout(typing,1000);

/* FINAL TEXT */
let final = "makasih ya udah ada... aku sayang kamu lebih dari yang kamu tau 😭💗";
let j=0;
function finalTyping(){
  if(j < final.length){
    document.getElementById("finalText").innerHTML += final.charAt(j);
    j++;
    setTimeout(finalTyping,50);
  }
}
setTimeout(finalTyping,5000);

/* HEART FALL */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);
</script>

</body>
</html>
