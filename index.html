<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💗</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ffc0cb, #fff5f5);
    overflow: hidden;
    text-align: center;
}

/* Container */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Title */
h1 {
    font-family: 'Pacifico', cursive;
    color: #ff4d6d;
}

/* Button */
button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    background-color: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Bunny */
.bunny {
    font-size: 60px;
    animation: float 2s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* Hidden */
.hidden {
    display: none;
}

/* Love text */
#loveText {
    max-width: 300px;
    margin: auto;
    color: #ff4d6d;
}

/* Hearts */
.heart {
    position: absolute;
    color: pink;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% { top: -10%; }
    100% { top: 110%; }
}
</style>
</head>

<body>

<!-- Music -->
<audio id="music" loop>
    <source src="https://files.catbox.moe/5q8f4z.mp3" type="audio/mp3">
</audio>

<div class="container" id="start">
    <div class="bunny">🐰</div>
    <h1>Open This 💌</h1>
    <button onclick="openLetter()">Open</button>
</div>

<div class="container hidden" id="question">
    <h1>Kamu sayang aku ga? 😳</h1>
    <button onclick="showLove()">Iya 💕</button>
    <button id="noBtn">Engga 😒</button>
</div>

<div class="container hidden" id="letter">
    <h1>For You 💗</h1>
    <p id="loveText"></p>
</div>

<script>
const text = "aku cuma mau bilang... makasih ya udah ada 🥺💗 aku beneran seneng bisa kenal kamu... dan sedikit demi sedikit, aku jatuh sayang 😭💕";

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("loveText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}

function openLetter() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("question").classList.remove("hidden");
    document.getElementById("music").play();
}

function showLove() {
    document.getElementById("question").classList.add("hidden");
    document.getElementById("letter").classList.remove("hidden");
    typeWriter();
}

/* Tombol kabur 😆 */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* Hati jatuh */
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 500);
</script>

</body>
</html>
